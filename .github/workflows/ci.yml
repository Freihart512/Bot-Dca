name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

# Un solo job: un checkout, un `pnpm install` y un `node_modules` compartido por todos los pasos.
# (Cada job de GitHub corre en un runner limpio; la "caché" de pnpm en setup-node acelera el
# almacén global, pero no pasa `node_modules` de un job a otro. Antes reinstalábamos en cada
# job; al unificar se evita confusión y se asegura el mismo árbol de dependencias en todo el run.)

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
          POSTGRES_DB: bot_dca_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bot -d bot_dca_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://bot:bot@localhost:5432/bot_dca_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile
      - name: Lint
        run: pnpm -w lint
      - name: Typecheck
        run: pnpm -w typecheck
      - name: Unit tests
        run: pnpm -w test:unit
      - name: Integration tests
        run: pnpm -w test:integration
      - name: E2E tests
        run: pnpm -w test:e2e
      - name: Build
        run: pnpm -w build
